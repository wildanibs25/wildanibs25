name: Update profile statistics

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "scripts/generate-profile-stats.mjs"
      - ".github/workflows/update-profile-stats.yml"

permissions:
  contents: write

concurrency:
  group: profile-statistics
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Generate statistics from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-profile-stats.mjs

      - name: Commit updated cards
        shell: bash
        run: |
          if git diff --quiet -- profile; then
            echo "Statistics are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update profile statistics"
          git push
